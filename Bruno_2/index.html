<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Misión Bruno 2</title>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0a0a1a">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <!-- =========================================================
       PANTALLA 1: CANDADOS
       Dos candados grandes asegurando una cadena horizontal.
       ========================================================= -->
  <div id="screen-locks" class="screen hidden">
    <div class="locks-bg" aria-hidden="true"></div>

    <h1 class="title-main">MISIÓN CLASIFICADA</h1>
    <p class="subtitle">Descifra los dos códigos para liberar la cadena</p>

    <!-- ESCENA DE LA CADENA: la cadena corre horizontalmente
         y los dos candados están enganchados a ella por sus arcos.     -->
    <div class="chain-scene">

      <!-- La cadena horizontal que los candados están asegurando.
           Posicionada de forma absoluta en la escena.                  -->
      <div class="chain-bar" id="chain-bar" aria-hidden="true"></div>

      <!-- Fila de los dos candados (colocados debajo de la cadena) -->
      <div class="locks-row">

        <!-- ===== CANDADO 0 (izquierda) =====
             TODO: cambiar data-combo con el código real de la historia
             Formato: "digito1,digito2,digito3"                         -->
        <div class="lock" id="lock-0" data-combo="1,2,3">
          <!-- Arco del candado (la parte en U que pasa a través de la cadena) -->
          <div class="lock-shackle" aria-hidden="true"></div>
          <!-- Cuerpo del candado con las ruedas numéricas -->
          <div class="lock-body">
            <div class="wheels-container">
              <div class="wheel-wrapper">
                <div class="wheel" data-lock="0" data-wheel="0"></div>
              </div>
              <div class="wheel-wrapper">
                <div class="wheel" data-lock="0" data-wheel="1"></div>
              </div>
              <div class="wheel-wrapper">
                <div class="wheel" data-lock="0" data-wheel="2"></div>
              </div>
            </div>
          </div>
          <!-- Destello de luz al abrir este candado -->
          <div class="lock-open-flash" aria-hidden="true"></div>
          <!-- Símbolo ✓ que aparece cuando el candado está abierto -->
          <div class="lock-badge" aria-hidden="true">✓</div>
        </div><!-- /lock-0 -->

        <!-- ===== CANDADO 1 (derecha) =====
             TODO: cambiar data-combo con el código real               -->
        <div class="lock" id="lock-1" data-combo="4,5,6">
          <div class="lock-shackle" aria-hidden="true"></div>
          <div class="lock-body">
            <div class="wheels-container">
              <div class="wheel-wrapper">
                <div class="wheel" data-lock="1" data-wheel="0"></div>
              </div>
              <div class="wheel-wrapper">
                <div class="wheel" data-lock="1" data-wheel="1"></div>
              </div>
              <div class="wheel-wrapper">
                <div class="wheel" data-lock="1" data-wheel="2"></div>
              </div>
            </div>
          </div>
          <div class="lock-open-flash" aria-hidden="true"></div>
          <div class="lock-badge" aria-hidden="true">✓</div>
        </div><!-- /lock-1 -->

      </div><!-- /locks-row -->
    </div><!-- /chain-scene -->

    <!-- Overlay de luz global que aparece al abrir un candado -->
    <div id="lock-light-overlay" class="light-overlay" aria-hidden="true"></div>

  </div><!-- /screen-locks -->


  <!-- =========================================================
       TRANSICIÓN: Zoom-luz entre pantalla de candados y mapa
       ========================================================= -->
  <div id="transition-overlay" class="transition-overlay hidden" aria-hidden="true"></div>


  <!-- =========================================================
       PANTALLA 2: MAPA DE MISIONES
       ========================================================= -->
  <div id="screen-map" class="screen hidden">
    <h2 class="map-title">MAPA DE MISIONES</h2>

    <!-- Fondo del mapa. TODO: reemplazar el fondo CSS con la imagen real:
         añadir en CSS → background-image: url('assets/images/mapa.jpg') -->
    <div class="map-container" id="map-container">
      <!-- Los pines se generan dinámicamente en map.js -->
    </div>

    <!-- Modal que aparece al tocar un pin disponible -->
    <div id="mission-modal" class="modal hidden" role="dialog" aria-modal="true">
      <div class="modal-content">
        <h3 id="modal-title">Misión</h3>
        <p id="modal-desc">Descripción...</p>
        <button id="modal-close" class="btn-primary">Cerrar</button>
      </div>
    </div>
  </div><!-- /screen-map -->


  <!-- =========================================================
       BOTÓN FLOTANTE DE CONTACTO (siempre visible en pantalla)
       ========================================================= -->
  <button id="contact-btn" class="contact-fab" aria-label="Contactar al agente">
    <!-- TODO: reemplazar con imagen del personaje cuando esté definido -->
    <span class="contact-icon" aria-hidden="true">📡</span>
    <span class="contact-pulse" aria-hidden="true"></span>
  </button>


  <!-- =========================================================
       BOTÓN DE REINICIO (pequeño, esquina superior derecha,
       fondo oscuro para que sea casi invisible)
       ========================================================= -->
  <button id="reset-btn" class="reset-btn" aria-label="Reiniciar progreso" title="Opciones">⚙</button>

  <!-- Modal de confirmación de reinicio -->
  <div id="confirm-modal" class="confirm-modal hidden" role="dialog" aria-modal="true">
    <div class="confirm-box">
      <p class="confirm-text">¿Borrar todo el progreso y empezar desde cero?</p>
      <div class="confirm-buttons">
        <button id="confirm-yes" class="btn-danger">Sí, reiniciar</button>
        <button id="confirm-no"  class="btn-secondary">Cancelar</button>
      </div>
    </div>
  </div>


  <!-- =========================================================
       OVERLAY: PANTALLA DE LLAMADA ENTRANTE
       ========================================================= -->
  <div id="screen-call" class="overlay-screen hidden" role="dialog" aria-modal="true">
    <div class="call-container">
      <div class="caller-avatar">
        <!-- TODO: reemplazar con imagen del personaje:
             <img src="assets/images/personaje.jpg" alt="Agente X"> -->
        <div class="avatar-placeholder">?</div>
      </div>
      <!-- TODO: reemplazar "Agente X" con el nombre real del personaje -->
      <h2 class="caller-name">Agente X</h2>
      <p class="call-status" id="call-status-text">Llamada entrante...</p>
      <div class="call-rings" aria-hidden="true">
        <div class="call-ring ring-1"></div>
        <div class="call-ring ring-2"></div>
        <div class="call-ring ring-3"></div>
      </div>
      <div class="call-buttons">
        <button id="btn-answer" class="call-btn answer" aria-label="Contestar">📞</button>
        <button id="btn-hangup" class="call-btn hangup"  aria-label="Colgar">📵</button>
      </div>
    </div>
  </div>


  <!-- =========================================================
       OVERLAY: CHAT ESTILO WHATSAPP
       ========================================================= -->
  <div id="screen-chat" class="overlay-screen hidden" role="dialog" aria-modal="true">
    <div class="chat-container">
      <div class="chat-header">
        <div class="chat-avatar">
          <!-- TODO: reemplazar con imagen del personaje -->
          <div class="avatar-placeholder small">?</div>
        </div>
        <div class="chat-header-info">
          <!-- TODO: reemplazar con el nombre real del personaje -->
          <span class="chat-name">Agente X</span>
          <span class="chat-online">en línea</span>
        </div>
        <button id="chat-close" class="chat-close-btn" aria-label="Cerrar chat">✕</button>
      </div>
      <div class="chat-messages" id="chat-messages" role="log" aria-live="polite"></div>
      <div class="chat-typing" id="chat-typing" aria-label="El agente está escribiendo">
        <span></span><span></span><span></span>
      </div>
    </div>
  </div>


  <!-- =========================================================
       ELEMENTOS DE AUDIO — Reemplazar rutas con archivos reales
       Ver Bruno_2/assets/audio/AQUI_VAN_LOS_AUDIOS.md
       ========================================================= -->
  <!-- TODO: reemplazar con música de fondo real (estilo misterio, loop) -->
  <audio id="audio-bg"       src="assets/audio/musica-fondo.mp3" loop    preload="none"></audio>
  <!-- TODO: reemplazar con sonido de "click" mecánico corto -->
  <audio id="audio-click"    src="assets/audio/click.mp3"                preload="none"></audio>
  <!-- TODO: reemplazar con sonido de candado abriéndose -->
  <audio id="audio-unlock"   src="assets/audio/unlock.mp3"               preload="none"></audio>
  <!-- TODO: reemplazar con tono de llamada entrante (loop) -->
  <audio id="audio-ringtone" src="assets/audio/ringtone.mp3"    loop     preload="none"></audio>


  <!-- Scripts — main.js primero (define el estado global) -->
  <script src="js/main.js"></script>
  <script src="js/locks.js"></script>
  <script src="js/map.js"></script>
  <script src="js/contact.js"></script>

</body>
</html>
