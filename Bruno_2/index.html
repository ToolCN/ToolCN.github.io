<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <!-- Viewport optimizado para tablet horizontal, sin zoom manual -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

  <!-- Título de la app -->
  <title>Misión Bruno 2</title>

  <!-- Para que se pueda agregar a la pantalla de inicio en iPad/iOS -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0a0a1a">

  <!-- Fuente de Google Fonts: Orbitron da el look de ciencia ficción/misterio -->
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">

  <!-- Todos los estilos en un solo archivo CSS -->
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <!-- =========================================================
       BOTÓN DE REINICIO (esquina superior derecha)
       A propósito es discreto (fondo negro, casi invisible sobre
       el fondo oscuro de la app) para que Bruno no lo toque sin
       querer. Al presionarlo, SIEMPRE pide confirmación antes
       de borrar el progreso.
       ========================================================= -->
  <button id="reset-btn" class="reset-btn" aria-label="Reiniciar progreso">↺</button>

  <!-- Modal de confirmación de reinicio -->
  <div id="reset-modal" class="modal hidden" role="dialog" aria-modal="true">
    <div class="modal-content">
      <h3>¿Reiniciar progreso?</h3>
      <p>Esto borrará todo el avance guardado (candados, misiones y capítulo) y la app empezará desde cero. No se puede deshacer.</p>
      <div class="modal-buttons">
        <button id="reset-cancel"  class="btn-secondary">Cancelar</button>
        <button id="reset-confirm" class="btn-primary">Sí, reiniciar</button>
      </div>
    </div>
  </div>


  <!-- =========================================================
       PANTALLA 1: CANDADOS
       Muestra 2 cadenas con sus candados de combinación.
       ========================================================= -->
  <div id="screen-locks" class="screen hidden">

    <!-- Fondo con textura de cuadrícula decorativa (creado en CSS) -->
    <div class="locks-bg" aria-hidden="true"></div>

    <h1 class="title-main">MISIÓN CLASIFICADA</h1>
    <p class="subtitle">Abre los 2 candados para acceder</p>

    <!-- Contenedor de las 2 cadenas. Cada candado "amarra" los dos
         extremos de su cadena (por eso cada chain-unit tiene 2 tiras
         de cadena -izquierda y derecha- que llegan al candado desde
         ambos lados, en vez de una sola tira colgando arriba). -->
    <div class="chains-container">

      <!-- ---- CANDADO 0 ---- -->
      <!-- data-combo="X,Y,Z" → combinación correcta (ver locks.js para cambiarla) -->
      <div class="chain-unit" id="chain-0">
        <!-- Las 2 tiras de cadena que el candado mantiene unidas -->
        <div class="chain-loop" aria-hidden="true">
          <div class="chain-strand chain-left"></div>
          <div class="chain-strand chain-right"></div>
        </div>
        <div class="lock" id="lock-0" data-combo="1,2,3">
          <div class="lock-shackle" aria-hidden="true"></div>
          <div class="lock-body">
            <!-- 3 ruedas numéricas del candado -->
            <div class="wheels-container">
              <div class="wheel-wrapper">
                <div class="wheel" data-lock="0" data-wheel="0"></div>
              </div>
              <div class="wheel-wrapper">
                <div class="wheel" data-lock="0" data-wheel="1"></div>
              </div>
              <div class="wheel-wrapper">
                <div class="wheel" data-lock="0" data-wheel="2"></div>
              </div>
            </div>
          </div>
          <!-- Destello de luz que aparece al abrir el candado -->
          <div class="lock-open-flash" aria-hidden="true"></div>
          <div class="lock-badge">✓</div>
        </div>
      </div>

      <!-- ---- CANDADO 1 ---- -->
      <div class="chain-unit" id="chain-1">
        <div class="chain-loop" aria-hidden="true">
          <div class="chain-strand chain-left"></div>
          <div class="chain-strand chain-right"></div>
        </div>
        <div class="lock" id="lock-1" data-combo="4,5,6">
          <div class="lock-shackle" aria-hidden="true"></div>
          <div class="lock-body">
            <div class="wheels-container">
              <div class="wheel-wrapper">
                <div class="wheel" data-lock="1" data-wheel="0"></div>
              </div>
              <div class="wheel-wrapper">
                <div class="wheel" data-lock="1" data-wheel="1"></div>
              </div>
              <div class="wheel-wrapper">
                <div class="wheel" data-lock="1" data-wheel="2"></div>
              </div>
            </div>
          </div>
          <div class="lock-open-flash" aria-hidden="true"></div>
          <div class="lock-badge">✓</div>
        </div>
      </div>

    </div><!-- /chains-container -->

    <!-- Overlay de destello de luz global (cubre toda la pantalla al abrir un candado) -->
    <div id="lock-light-overlay" class="light-overlay" aria-hidden="true"></div>

  </div><!-- /screen-locks -->


  <!-- =========================================================
       TRANSICIÓN: Zoom hacia la luz entre pantalla 1 y 2
       ========================================================= -->
  <div id="transition-overlay" class="transition-overlay hidden" aria-hidden="true"></div>


  <!-- =========================================================
       PANTALLA 2: MAPA DE MISIONES
       ========================================================= -->
  <div id="screen-map" class="screen hidden">

    <h2 class="map-title">MAPA DE MISIONES</h2>

    <!-- El mapa: TODO: reemplazar el fondo CSS con una imagen real:
         style="background-image: url('assets/images/mapa.jpg')"        -->
    <div class="map-container" id="map-container">
      <!-- Los pines de misión se generan dinámicamente desde map.js -->
    </div>

    <!-- Modal que aparece al tocar un pin disponible -->
    <div id="mission-modal" class="modal hidden" role="dialog" aria-modal="true">
      <div class="modal-content">
        <h3 id="modal-title">Misión</h3>
        <p id="modal-desc">Descripción...</p>
        <button id="modal-close" class="btn-primary">Cerrar</button>
      </div>
    </div>

  </div><!-- /screen-map -->


  <!-- =========================================================
       BOTÓN FLOTANTE DE CONTACTO
       Siempre visible. Abre llamada o chat según el modo.
       ========================================================= -->
  <button id="contact-btn" class="contact-fab" aria-label="Contactar al agente">
    <!-- TODO: reemplazar con la imagen del personaje cuando esté definido.
         Por ahora se usa un ícono de señal de radio como placeholder. -->
    <span class="contact-icon" aria-hidden="true">📡</span>
    <span class="contact-pulse" aria-hidden="true"></span>
  </button>


  <!-- =========================================================
       OVERLAY: PANTALLA DE LLAMADA ENTRANTE
       ========================================================= -->
  <div id="screen-call" class="overlay-screen hidden" role="dialog" aria-modal="true">
    <div class="call-container">

      <!-- Avatar / foto del personaje -->
      <div class="caller-avatar">
        <!-- TODO: reemplazar con imagen real del personaje:
             <img src="assets/images/personaje.jpg" alt="Agente X">
             Por ahora se muestra una silueta de interrogación. -->
        <div class="avatar-placeholder">?</div>
      </div>

      <!-- TODO: reemplazar "Agente X" con el nombre real del personaje -->
      <h2 class="caller-name">Agente X</h2>
      <p class="call-status" id="call-status-text">Llamada entrante...</p>

      <!-- Anillos de animación de "teléfono sonando" -->
      <div class="call-rings" aria-hidden="true">
        <div class="call-ring ring-1"></div>
        <div class="call-ring ring-2"></div>
        <div class="call-ring ring-3"></div>
      </div>

      <!-- Botones de contestar y colgar -->
      <div class="call-buttons">
        <button id="btn-answer" class="call-btn answer" aria-label="Contestar">📞</button>
        <button id="btn-hangup" class="call-btn hangup" aria-label="Colgar">📵</button>
      </div>

    </div>
  </div><!-- /screen-call -->


  <!-- =========================================================
       OVERLAY: CHAT ESTILO WHATSAPP
       ========================================================= -->
  <div id="screen-chat" class="overlay-screen hidden" role="dialog" aria-modal="true">
    <div class="chat-container">

      <!-- Cabecera del chat -->
      <div class="chat-header">
        <div class="chat-avatar">
          <!-- TODO: reemplazar con imagen real del personaje -->
          <div class="avatar-placeholder small">?</div>
        </div>
        <!-- TODO: reemplazar con el nombre real del personaje -->
        <div class="chat-header-info">
          <span class="chat-name">Agente X</span>
          <span class="chat-online">en línea</span>
        </div>
        <button id="chat-close" class="chat-close-btn" aria-label="Cerrar chat">✕</button>
      </div>

      <!-- Área de mensajes con burbujas -->
      <div class="chat-messages" id="chat-messages" role="log" aria-live="polite">
        <!-- Los mensajes se insertan dinámicamente desde contact.js -->
      </div>

      <!-- Indicador de "escribiendo..." (tres puntos animados) -->
      <div class="chat-typing" id="chat-typing" aria-label="El agente está escribiendo">
        <span></span><span></span><span></span>
      </div>

    </div>
  </div><!-- /screen-chat -->


  <!-- =========================================================
       ELEMENTOS DE AUDIO
       Todos los archivos son placeholder — reemplazar las rutas
       con los archivos de audio reales.
       ========================================================= -->

  <!-- TODO: reemplazar 'assets/audio/musica-fondo.mp3' con la música de fondo real.
             Estilo: suspenso/misterio, bucle suave. -->
  <audio id="audio-bg"      src="assets/audio/musica-fondo.mp3"  loop    preload="none"></audio>

  <!-- TODO: reemplazar con un sonido de "click" mecánico corto (tipo reloj/combinación). -->
  <audio id="audio-click"   src="assets/audio/click.mp3"                 preload="none"></audio>

  <!-- TODO: reemplazar con sonido de "candado abriéndose" (clic metálico + resorte). -->
  <audio id="audio-unlock"  src="assets/audio/unlock.mp3"                preload="none"></audio>

  <!-- TODO: reemplazar con el tono de "llamada entrante" en bucle. -->
  <audio id="audio-ringtone" src="assets/audio/ringtone.mp3"     loop    preload="none"></audio>


  <!-- =========================================================
       SCRIPTS — El orden importa:
       main.js primero (define funciones globales de estado),
       luego los módulos que dependen de él.
       ========================================================= -->
  <script src="js/main.js"></script>
  <script src="js/locks.js"></script>
  <script src="js/map.js"></script>
  <script src="js/contact.js"></script>

</body>
</html>
